<!DOCTYPE html>
<html>
<head>
    <title>Suppliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="mx-9">
    <div class="flex justify-between mb-6">
        <h1 class="text-2xl font-bold">Suppliers</h1>
        <button onclick="openAddModal()" 
            class="bg-gradient-to-r from-cyan-500 to-purple-600 text-white px-4 py-2 rounded-xl">
            Add Supplier
        </button>
    </div>

    <table class="w-full bg-white rounded shadow">
        <thead>
            <tr class="border-b text-stone-500">
                <th class="p-2">Name</th>
                <th class="p-2">Contact</th>
                <th class="p-2">Address</th>
                <th class="p-2">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in suppliers %}
            <tr class="border-b text-center">
                <td>{{ s.name }}</td>
                <td>{{ s.contact }}</td>
                <td>{{ s.address }}</td>
                <td>
                    <a onclick="openEditModal({{ s.id }}, '{{ s.name }}', '{{ s.contact }}', '{{ s.address }}')" class="text-blue-500 cursor-pointer">Edit</a> |
                    <a onclick="openDeleteModal({{ s.id }}, '{{ s.name }}')" class="text-red-500 cursor-pointer">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center">
    <div class="bg-white p-6 rounded w-96">
        <h2 class="text-xl font-bold mb-4">Add Supplier</h2>
    
        <form method="POST" action="{% url 'supplier_add' %}">
            {% csrf_token %}
            <input name="name" placeholder="Name" class="w-full mb-2 p-2 border rounded" required>
            <input name="contact" placeholder="Contact" class="w-full mb-2 p-2 border rounded" required>
            <textarea name="address" placeholder="Address" class="w-full mb-2 p-2 border rounded" required></textarea>
    
            <div class="flex justify-between">
                <button type="button" onclick="closeAddModal()" class="bg-gray-300 px-3 py-1 rounded">Cancel</button>
                <button class="bg-green-500 text-white px-3 py-1 rounded">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center">
    <div class="bg-white p-6 rounded w-96">
        <h2 class="text-xl font-bold mb-4">Edit Supplier</h2>
    
        <form id="editForm" method="POST">
            {% csrf_token %}
            <input id="edit_name" name="name" class="w-full mb-2 p-2 border rounded">
            <input id="edit_contact" name="contact" class="w-full mb-2 p-2 border rounded">
            <textarea id="edit_address" name="address" class="w-full mb-2 p-2 border rounded"></textarea>
    
            <div class="flex justify-between">
                <button type="button" onclick="closeEditModal()" class="bg-gray-300 px-3 py-1 rounded">Cancel</button>
                <button class="bg-green-500 text-white px-3 py-1 rounded">Update</button>
            </div>
        </form>
    </div>
</div>

{% comment %} Delete Modal {% endcomment %}
<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center">
    <div class="bg-white p-6 rounded w-80">
        <p>Delete <span id="delete_name"></span>?</p>
    
        <form id="deleteForm" method="POST">
            {% csrf_token %}
            <div class="flex justify-between mt-4">
                <button type="button" onclick="closeDeleteModal()" class="bg-gray-300 px-3 py-1 rounded">Cancel</button>
                <button class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>
            </div>
        </form>
    </div>
</div>
    
</body>

<script>
    function openAddModal(){ document.getElementById('addModal').classList.remove('hidden'); }
    function closeAddModal(){ document.getElementById('addModal').classList.add('hidden'); }
    
    function openEditModal(id, name, contact, address){
        document.getElementById('editModal').classList.remove('hidden');
        document.getElementById('edit_name').value = name;
        document.getElementById('edit_contact').value = contact;
        document.getElementById('edit_address').value = address;
        document.getElementById('editForm').action = `/suppliers/edit/${id}/`;
    }
    function closeEditModal(){ document.getElementById('editModal').classList.add('hidden'); }
    
    function openDeleteModal(id, name){
        document.getElementById('deleteModal').classList.remove('hidden');
        document.getElementById('delete_name').innerText = name;
        document.getElementById('deleteForm').action = `/suppliers/delete/${id}/`;
    }
    function closeDeleteModal(){ document.getElementById('deleteModal').classList.add('hidden'); }
</script>    
</html>
