<!DOCTYPE html>
<html>
<head>
    <title>Suppliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="mx-9">
    <div class="flex justify-between mb-6">
        <h1 class="text-2xl font-bold">Suppliers</h1>
        <button onclick="openAddModal()" 
            class="bg-gradient-to-r from-cyan-500 to-purple-600 text-white px-4 py-2 rounded-xl">
            Add Supplier
        </button>
    </div>

    <table class="w-full bg-white rounded shadow">
        <thead>
            <tr class="border-b text-stone-500">
                <th class="p-2">Name</th>
                <th class="p-2">Contact</th>
                <th class="p-2">Address</th>
                <th class="p-2">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in suppliers %}
            <tr class="border-b text-center">
                <td>{{ s.name }}</td>
                <td>{{ s.contact }}</td>
                <td>{{ s.address }}</td>
                <td>
                    <a href="#" class="text-blue-500">Edit</a> |
                    <a href="#" class="text-red-500">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center">
    <div class="bg-white p-6 rounded w-96">
        <h2 class="text-xl font-bold mb-4">Add Supplier</h2>
    
        <form method="POST" action="{% url 'supplier_add' %}">
            {% csrf_token %}
            <input name="name" placeholder="Name" class="w-full mb-2 p-2 border rounded" required>
            <input name="contact" placeholder="Contact" class="w-full mb-2 p-2 border rounded" required>
            <textarea name="address" placeholder="Address" class="w-full mb-2 p-2 border rounded" required></textarea>
    
            <div class="flex justify-between">
                <button type="button" onclick="closeAddModal()" class="bg-gray-300 px-3 py-1 rounded">Cancel</button>
                <button class="bg-green-500 text-white px-3 py-1 rounded">Save</button>
            </div>
        </form>
    </div>
</div>
    
</body>

<script>
    function openAddModal(){ document.getElementById('addModal').classList.remove('hidden'); }
    function closeAddModal(){ document.getElementById('addModal').classList.add('hidden'); }
</script>    
</html>
