<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="Username"
            class="w-full mb-4 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>

        <input type="password" name="password" placeholder="Password"
            class="w-full mb-4 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>

        <button type="submit"
            class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 text-white p-2 rounded-lg">
            Login
        </button>
    </form>
</div>

</body>
</html>
